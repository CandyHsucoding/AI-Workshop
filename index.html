<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>3/26 AI 效率工作坊 - 多巴胺特別版</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
  <style>
    /* 🎨 多巴胺 UI 自訂 CSS 🎨 */
    :root {
      --theme-color: #ff3860; /* 亮蘋果紅 */
      --background-color: #fcfcfc;
    }
    
    /* 介面樣式優化 */
    .sidebar { background-color: #f7f7f7; border-right: 1px solid #eee; }
    .sidebar-nav li > a { font-size: 16px; font-weight: 500; }
    
    /* 🌈 多巴胺卡片系統 (Dopamine Cards) 🌈 */
    .markdown-section h3 { margin-top: 0; padding-top: 10px; }
    
    .dopamine-card {
      border-radius: 15px;
      padding: 20px 25px;
      margin-bottom: 30px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      border-left: 10px solid; /* 左側粗色條 */
    }
    .dopamine-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    
    /* 各種不同的多巴胺配色 */
    .color-pink { background-color: #fff0f3; border-left-color: #ff3860; color: #a10024; } /* 蘋果紅/粉 */
    .color-orange { background-color: #fff8f0; border-left-color: #ff9f43; color: #a65100; } /* 活力橘 */
    .color-yellow { background-color: #fffdf0; border-left-color: #fed330; color: #8a6a00; } /* 太陽黃 */
    .color-green { background-color: #f0fff4; border-left-color: #26de81; color: #008a41; } /* 健康綠 */
    .color-blue { background-color: #f0f8ff; border-left-color: #2d98da; color: #005a8a; } /* 智慧藍 */
    .color-purple { background-color: #f8f0ff; border-left-color: #a55eea; color: #5a00a6; } /* 創意紫 */

    /* 程式碼區塊微調 (複製按鈕) */
    .docsify-copy-code-button { background: #555 !important; color: white !important; opacity: 0.8; }
    .dopamine-card pre { background-color: rgba(255,255,255,0.6) !important; border: 1px solid rgba(0,0,0,0.05); }
  </style>
</head>
<body>
  <div id="app">🏃 AI 載入中...</div>
  <script>
    window.$docsify = {
      name: '🍎 AI 效率工作坊',
      loadSidebar: true,   // 啟用側邊欄 (必需)
      coverpage: true,     // 啟用封面
      subMaxLevel: 2,
      search: { placeholder: '🔍 搜尋教學', noData: '找不到喔！' },
      copyCode: { buttonText: '複製提示詞', successText: '已複製' }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
