<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>3/26 營養師 AI 效率提升工作坊</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
  
  <style>
    /* 自訂 UI 樣式，模仿參考網站 */
    :root {
      --theme-color: #42b983; /* GoogleFlow 的經典綠色 */
    }
    nav.app-nav li ul { min-width: 100px; }
    .sidebar-nav li > a { font-size: 15px; }
    section.content { padding-top: 30px; }
    .markdown-section h1 { margin-bottom: 1rem; }
    /* 讓程式碼區塊更好看 */
    .docsify-copy-code-button { background: #42b983 !important; color: #fff !important; }
  </style>
</head>
<body>
  <div id="app">🏃 營養師 AI 載入中...</div>
  <script>
    window.$docsify = {
      name: '🍎 AI 效率工作坊',
      repo: '', // 如果你有 GitHub 網址可以放這
      loadSidebar: true,
      loadNavbar: true,   // 開啟頂部導覽列
      subMaxLevel: 3,     // 側邊欄自動抓取標題層級
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '🔍 搜尋教學內容',
        noData: '找不到結果',
        depth: 4
      },
      copyCode: {
        buttonText: '複製提示詞',
        errorText: '錯誤',
        successText: '已複製'
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
</body>
</html>
