<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>3/26 營養師 AI 效率工作坊</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
  <style>
    :root { --theme-color: #42b983; } /* Google 同款綠色 */
    .sidebar-nav li > a { font-size: 15px; font-weight: 500; }
    /* 讓複製按鈕更明顯 */
    .docsify-copy-code-button { background: #42b983 !important; color: white !important; }
  </style>
</head>
<body>
  <div id="app">🏃 載入中...</div>
  <script>
    window.$docsify = {
      name: '🍎 AI 效率工作坊',
      loadSidebar: true,   // 啟用側邊欄
      loadNavbar: true,    // 啟用頂部導覽
      coverpage: true,     // 啟用封面
      onlyCover: false,    // 設定為 false 才能向下捲動看到內容
      subMaxLevel: 3,      // 自動目錄深度
      auto2top: true,
      search: { placeholder: '🔍 搜尋教學', noData: '找不到喔！', depth: 3 },
      copyCode: { buttonText: '複製提示詞', successText: '已複製' }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
