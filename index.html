<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>3/26 營養師 AI 效率提升工作坊</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
  <style>
    /* 自訂主題顏色 (營養師的蘋果紅與健康綠) */
    :root {
      --theme-color: #e53935; 
    }
    .sidebar-nav li > a { font-size: 16px; font-weight: bold; }
  </style>
</head>
<body>
  <div id="app">🏃 營養師 AI 載入中...</div>
  <script>
    window.$docsify = {
      name: '🍎 AI 效率工作坊',
      repo: '',
      loadSidebar: true, // 開啟側邊欄
      subMaxLevel: 2,    // 自動抓取 README 的標題當作目錄
      coverpage: true,   // 開啟漂亮封面頁
      auto2top: true,    // 切換頁面後自動回到頂部
      search: {
        placeholder: '搜尋教學內容...',
        noData: '找不到結果！',
        depth: 6
      },
      copyCode: {
        buttonText: '點擊複製提示詞',
        errorText: '錯誤',
        successText: '已複製'
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
